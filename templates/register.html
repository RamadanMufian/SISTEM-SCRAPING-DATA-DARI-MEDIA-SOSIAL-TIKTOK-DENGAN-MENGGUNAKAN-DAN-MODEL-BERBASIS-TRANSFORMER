<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi | TikTok Sentiment Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e7b4a;
            --primary-dark: #156b40;
            --secondary: #25f4ee;
            --dark: #0a0f0d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --text-muted: #8fa196;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 123, 74, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(46, 125, 50, 0.1) 0%, transparent 40%);
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { text-align: center; margin-bottom: 25px; }
        .logo i {
            font-size: 40px;
            background: linear-gradient(135deg, #2ecc71, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .logo h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo p { color: var(--text-muted); font-size: 14px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group.full { grid-column: span 2; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: color 0.3s; }

        input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus { outline: none; border-color: var(--secondary); background: rgba(0, 0, 0, 0.3); }
        input:focus + i { color: var(--secondary); }

        .btn-regis {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(30, 123, 74, 0.4);
        }

        .btn-regis:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 15px 35px -5px rgba(30, 123, 74, 0.5); }

        .alert { padding: 12px 15px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .alert-error { background: rgba(255, 69, 58, 0.1); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.2); }
        .alert-info { background: rgba(37, 244, 238, 0.1); color: var(--secondary); border: 1px solid rgba(37, 244, 238, 0.2); }

        .footer-links { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
            <h1>Buat Akun Administrator</h1>
            <p>Hanya satu akun yang diperbolehkan dalam sistem</p>
        </div>

        {% if error %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
        {% endif %}

        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group full">
                <input type="text" name="full_name" placeholder="Nama Lengkap" required>
                <i class="fas fa-id-card"></i>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="form-group full">
                <input type="password" name="password" placeholder="Kata Sandi (Min. 8 karakter)" required>
                <i class="fas fa-lock"></i>
            </div>
            <div class="form-group full">
                <input type="password" name="confirm_password" placeholder="Konfirmasi Kata Sandi" required>
                <i class="fas fa-check-double"></i>
            </div>
            
            <button type="submit" class="btn-regis">Daftarkan Administrator</button>
        </form>

        <div class="footer-links">
            Sudah punya akun? <a href="{{ url_for('login') }}">Masuk</a>
        </div>
    </div>
</body>
</html>
